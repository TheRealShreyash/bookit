<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookIT — Seat Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Manrope:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f0f0f;
        --bg2: #161616;
        --bg3: #1e1e1e;
        --bg4: #262626;
        --amber: #e8a045;
        --amber2: #f0b866;
        --amber-dim: rgba(232, 160, 69, 0.1);
        --amber-glow: rgba(232, 160, 69, 0.2);
        --text: #f5f0e8;
        --text2: rgba(245, 240, 232, 0.55);
        --text3: rgba(245, 240, 232, 0.25);
        --green: #52b788;
        --green-dim: rgba(82, 183, 136, 0.12);
        --green-bdr: rgba(82, 183, 136, 0.35);
        --red-dim: rgba(180, 60, 50, 0.15);
        --red-bdr: rgba(180, 60, 50, 0.3);
        --red-text: rgba(220, 100, 90, 0.6);
        --border: rgba(245, 240, 232, 0.06);
        --border2: rgba(245, 240, 232, 0.1);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "Manrope", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Subtle grain texture overlay */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 100;
        opacity: 0.4;
      }

      /* Radial ambient glow */
      body::before {
        content: "";
        position: fixed;
        top: -30%;
        left: 50%;
        transform: translateX(-50%);
        width: 800px;
        height: 500px;
        background: radial-gradient(
          ellipse,
          rgba(232, 160, 69, 0.04) 0%,
          transparent 70%
        );
        pointer-events: none;
        z-index: 0;
      }

      /* ── Nav ── */
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.25rem 2rem;
        background: rgba(15, 15, 15, 0.85);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
      }

      .logo {
        font-family: "Playfair Display", serif;
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.02em;
      }
      .logo em {
        color: var(--amber);
        font-style: normal;
      }

      .btn-signout {
        font-family: "Manrope", sans-serif;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.07em;
        color: var(--text2);
        background: var(--bg3);
        border: 1px solid var(--border2);
        border-radius: 999px;
        padding: 0.45rem 1.1rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-signout:hover {
        color: #ffaaaa;
        border-color: rgba(180, 60, 50, 0.5);
        background: rgba(180, 60, 50, 0.1);
      }

      /* ── Main wrap ── */
      .wrap {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 7rem 1.5rem 5rem;
      }

      /* ── Hero ── */
      .hero {
        text-align: center;
        max-width: 680px;
        margin-bottom: 3.5rem;
        animation: fadeUp 0.7s ease both;
      }

      .now-showing {
        display: inline-block;
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--amber);
        border: 1px solid rgba(232, 160, 69, 0.25);
        border-radius: 999px;
        padding: 0.35rem 1rem;
        margin-bottom: 1.5rem;
      }

      .movie-title {
        font-family: "Playfair Display", serif;
        font-size: clamp(2rem, 6vw, 3.8rem);
        font-weight: 900;
        line-height: 1.05;
        color: var(--text);
        letter-spacing: -0.02em;
        margin-bottom: 0.75rem;
      }

      .movie-tagline {
        font-size: 0.9rem;
        color: var(--text2);
        letter-spacing: 0.03em;
        font-style: italic;
      }

      /* ── Legend ── */
      .legend {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 0.6rem 1.5rem;
        margin-bottom: 2.5rem;
        animation: fadeUp 0.7s 0.1s ease both;
      }
      .leg {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.75rem;
        color: var(--text2);
      }
      .ldot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .ldot-a {
        background: var(--green);
        box-shadow: 0 0 8px rgba(82, 183, 136, 0.4);
      }
      .ldot-b {
        border: 1px solid rgba(220, 100, 90, 0.5);
      }
      .leg-sep {
        width: 1px;
        height: 14px;
        background: var(--border2);
      }

      /* ── Screen label ── */
      .screen {
        width: 100%;
        max-width: 640px;
        margin-bottom: 1.25rem;
        animation: fadeUp 0.7s 0.15s ease both;
      }
      .screen-bar {
        height: 3px;
        background: linear-gradient(
          to right,
          transparent,
          var(--amber),
          transparent
        );
        opacity: 0.3;
        border-radius: 2px;
        margin-bottom: 0.5rem;
      }
      .screen-label {
        text-align: center;
        font-size: 0.6rem;
        font-weight: 600;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: var(--text3);
      }

      /* ── Seat box ── */
      .seat-box {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: clamp(1.25rem, 4vw, 2.25rem);
        max-width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        animation: fadeUp 0.8s 0.2s ease both;
        position: relative;
      }
      .seat-box::before {
        content: "";
        position: absolute;
        top: 0;
        left: 15%;
        right: 15%;
        height: 2px;
        background: linear-gradient(
          to right,
          transparent,
          var(--amber),
          transparent
        );
        opacity: 0.35;
        border-radius: 2px;
      }
      .seat-box::-webkit-scrollbar {
        height: 3px;
      }
      .seat-box::-webkit-scrollbar-thumb {
        background: var(--bg4);
        border-radius: 2px;
      }

      #tbl {
        border-collapse: separate;
        border-spacing: clamp(6px, 1.5vw, 11px);
        margin: 0 auto;
      }

      /* ── Row label ── */
      .rl {
        font-size: 0.6rem;
        font-weight: 600;
        color: var(--text3);
        letter-spacing: 0.1em;
        padding-right: 0.5rem;
        vertical-align: middle;
        text-align: right;
      }

      /* ── Seats ── */
      .seat {
        width: clamp(46px, 9vw, 66px);
        height: clamp(46px, 9vw, 66px);
        border-radius: 10px;
        text-align: center;
        vertical-align: middle;
        font-size: clamp(0.72rem, 1.3vw, 0.88rem);
        font-weight: 700;
        cursor: pointer;
        position: relative;
        user-select: none;
        transition:
          transform 0.18s,
          box-shadow 0.18s,
          background 0.18s,
          border-color 0.18s;
        animation: seatIn 0.4s ease both;
      }
      @keyframes seatIn {
        from {
          opacity: 0;
          transform: scale(0.7);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .seat-a {
        background: var(--green-dim);
        border: 1px solid var(--green-bdr);
        color: var(--green);
      }
      .seat-a:hover {
        transform: translateY(-4px);
        background: rgba(82, 183, 136, 0.2);
        border-color: rgba(82, 183, 136, 0.6);
        box-shadow: 0 8px 28px rgba(82, 183, 136, 0.2);
        color: #6fcf97;
      }
      .seat-a:active {
        transform: translateY(-2px) scale(0.97);
      }

      .seat-b {
        background: var(--red-dim);
        border: 1px solid var(--red-bdr);
        color: var(--red-text);
        cursor: not-allowed;
      }

      /* Tooltip */
      .tip {
        position: absolute;
        bottom: calc(100% + 9px);
        left: 50%;
        transform: translateX(-50%);
        background: var(--bg4);
        border: 1px solid var(--border2);
        color: var(--text2);
        font-size: 0.68rem;
        font-weight: 500;
        padding: 0.45rem 0.85rem;
        border-radius: 8px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s;
        z-index: 30;
      }
      .tip strong {
        color: var(--text);
      }
      .tip::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        border: 4px solid transparent;
        border-top-color: var(--border2);
      }
      .seat-b:hover .tip {
        opacity: 1;
      }

      /* ── Footer ── */
      footer {
        margin-top: 3rem;
        font-size: 0.65rem;
        color: var(--text3);
        letter-spacing: 0.12em;
        text-align: center;
        animation: fadeUp 0.7s 0.4s ease both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 480px) {
        nav {
          padding: 1rem 1.25rem;
        }
        .wrap {
          padding: 6rem 0.75rem 4rem;
        }
        .legend {
          gap: 1rem;
          padding: 0.5rem 1.1rem;
        }
        .seat-box {
          padding: 1rem 0.75rem;
          border-radius: 14px;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="logo">book<em>IT</em></div>
      <button class="btn-signout" onclick="logout()">Sign out</button>
    </nav>

    <div class="wrap">
      <div class="hero">
        <span class="now-showing">Now Showing</span>
        <h1 class="movie-title">Dhurandhar<br />The Revenge</h1>
        <p class="movie-tagline">Jassi ko ghar ki yaad kyu nhi aai?</p>
      </div>

      <div class="legend">
        <div class="leg">
          <div class="ldot ldot-a"></div>
          Available
        </div>
        <div class="leg-sep"></div>
        <div class="leg">
          <div class="ldot ldot-b"></div>
          Booked
        </div>
      </div>

      <div class="screen">
        <div class="screen-bar"></div>
        <div class="screen-label">Screen</div>
      </div>

      <div class="seat-box">
        <table id="tbl"></table>
      </div>

      <footer>© 2025 BookIT · All seats are subject to availability</footer>
    </div>

    <script>
      async function apiFetch(url, options = {}) {
        const token = localStorage.getItem("accessToken");
        const res = await fetch(url, {
          ...options,
          headers: { Authorization: `Bearer ${token}` },
          credentials: "include",
        });
        if (res.status === 401) {
          const refreshRes = await fetch("/auth/refresh-token", {
            method: "POST",
            credentials: "include",
          });
          if (!refreshRes.ok) {
            localStorage.removeItem("accessToken");
            window.location.href = "/login";
            return;
          }
          const { data } = await refreshRes.json();
          localStorage.setItem("accessToken", data.accessToken);
          return fetch(url, {
            ...options,
            headers: { Authorization: `Bearer ${data.accessToken}` },
            credentials: "include",
          });
        }
        return res;
      }

      async function run() {
        const tbl = document.getElementById("tbl");
        const res = await apiFetch("/seats");
        if (!res) return;
        const resarray = await res.json();
        const j = resarray.sort((a, b) => a.id - b.id);
        const rowLabels = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J"];
        let tr;
        for (let i = 0; i < j.length; i++) {
          if (i % 8 === 0) {
            tr = document.createElement("tr");
            const lbl = document.createElement("td");
            lbl.className = "rl";
            lbl.textContent = rowLabels[Math.floor(i / 8)] || "";
            tr.appendChild(lbl);
          }
          const td = document.createElement("td");
          td.style.animationDelay = i * 22 + "ms";
          if (j[i].isbooked) {
            td.className = "seat seat-b";
            td.innerHTML = `${j[i].id}<div class="tip">Booked by <strong>${j[i].name}</strong></div>`;
          } else {
            td.className = "seat seat-a";
            td.textContent = j[i].id;
          }
          td.addEventListener("click", async function (e) {
            const el = e.currentTarget;
            if (el.classList.contains("seat-b")) return;
            const id = j[i].id;
            const name = prompt("Enter your name to book seat " + id);
            if (!name) return;
            try {
              const res = await apiFetch(`/${id}/${name}`, { method: "PUT" });
              const data = await res.json();
              if (data.error) {
                alert("Seat already booked!");
              } else {
                alert("Seat " + id + " booked successfully!");
                el.className = "seat seat-b";
                el.innerHTML = `${id}<div class="tip">Booked by <strong>${name}</strong></div>`;
              }
            } catch (ex) {
              alert("Error: " + ex);
            }
          });
          tr.appendChild(td);
          tbl.appendChild(tr);
        }
      }

      async function logout() {
        try {
          await fetch("/auth/logout", {
            method: "POST",
            headers: {
              Authorization: `Bearer ${localStorage.getItem("accessToken")}`,
            },
            credentials: "include",
          });
        } catch (e) {}
        localStorage.removeItem("accessToken");
        window.location.href = "/login";
      }

      run();
    </script>
  </body>
</html>
